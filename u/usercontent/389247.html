<!DOCTYPE html>
<html>
<head>
<style>
body {
    background-color: #2e7d32;
    color: white;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: row;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    transition: all 1s ease;
}

#sidebar {
    width: 320px;
    background: rgba(0, 0, 0, 0.5);
    padding: 20px;
    border-right: 2px solid rgba(255, 255, 255, 0.1);
    display: flex;
    flex-direction: column;
    gap: 15px;
    overflow-y: auto;
}

#game-area {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    text-align: center;
}

.upgrade-card {
    background: rgba(255, 255, 255, 0.1);
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 10px;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

button {
    background-color: #ffd700;
    border: none;
    padding: 10px;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
}

button:disabled {
    background-color: #444 !important;
    color: #777 !important;
    cursor: not-allowed;
}

#world-button {
    background-color: #fff;
    color: #000;
    padding: 20px;
    font-size: 1.2rem;
    font-weight: 900;
    border: 4px solid #ffd700;
    cursor: pointer;
    margin-bottom: 20px;
    display: none;
}

#money-button {
    width: 250px;
    height: 250px;
    object-fit: contain;
    cursor: pointer;
    transition: transform 0.1s;
    border: 4px dashed rgba(255,255,255,0.3);
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
}

#money-button:active {
    transform: scale(0.9);
}

.stats-text {
    font-size: 1.2rem;
    margin: 5px 0;
}
</style>
</head>

<body>

<div id="sidebar">
    <h2 id="world-title">Green Forest Shop</h2>
    <div id="shop-container"></div>
</div>

<div id="game-area">
    <h1 id="money-display" style="font-size: 3rem;">Money: 0</h1>
    <div class="stats-text" id="stats">Click: 1 | Passive: 0/s</div>

    <button id="world-button" onclick="travel()">ASCEND TO NEXT WORLD</button>

    <img id="money-button" src="https://via.placeholder.com/250?text=CLICK+ME" onclick="makeMoney()">

    <div style="margin-top: 20px;">
        <label>Change Button Image:</label><br>
        <input type="file" id="image-picker" accept="image/*">
    </div>
</div>

<script>
let money = 0;
let moneyPerClick = 1;
let autoIncome = 0;
let worldIndex = 0;

const worlds = [
{
    name: "Green Forest",
    bg: "#2e7d32",
    textColor: "white",
    nextCost: 7000,
    upgrades: [
        { name: "Iron Gloves", cost: 100, type: "click", power: 5 },
        { name: "Small Drill", cost: 500, type: "auto", power: 10 },
        { name: "Mine Shaft", cost: 1500, type: "auto", power: 25 }
    ]
},
{
    name: "Orange Desert",
    bg: "#e67e22",
    textColor: "white",
    nextCost: 100000,
    upgrades: [
        { name: "Mega Clicker", cost: 5000, type: "click", power: 500 },
        { name: "Orange Reactor", cost: 15000, type: "auto", power: 1000 },
        { name: "Solar Array", cost: 50000, type: "auto", power: 5000 }
    ]
},
{
    name: "The Void",
    bg: "#000000",
    textColor: "#00ffcc",
    nextCost: 1000000,
    upgrades: [
        { name: "Void Tap", cost: 150000, type: "click", power: 20000 },
        { name: "Dark Miner", cost: 400000, type: "auto", power: 60000 },
        { name: "Black Hole", cost: 850000, type: "auto", power: 120000 }
    ]
},
{
    name: "God World",
    bg: "#FFD700",
    textColor: "#5e4b00",
    nextCost: Infinity,
    upgrades: [
        { name: "Divine Click", cost: 5000000, type: "click", power: 1000000 },
        { name: "Galaxy Farm", cost: 20000000, type: "auto", power: 5000000 },
        { name: "Omnipotence", cost: 100000000, type: "auto", power: 25000000 }
    ]
}
];

function updateUI() {
    const current = worlds[worldIndex];

    document.getElementById("money-display").textContent =
        "Money: " + Math.floor(money).toLocaleString();

    document.getElementById("stats").textContent =
        `Click: ${moneyPerClick.toLocaleString()} | Passive: ${autoIncome.toLocaleString()}/s`;

    const worldBtn = document.getElementById("world-button");

    if (money >= current.nextCost && worldIndex < worlds.length - 1) {
        worldBtn.style.display = "block";
        worldBtn.textContent =
            `TRAVEL TO ${worlds[worldIndex + 1].name} (Cost: ${current.nextCost.toLocaleString()})`;
    } else {
        worldBtn.style.display = "none";
    }

    document.querySelectorAll(".shop-btn").forEach(btn => {
        btn.disabled = money < parseInt(btn.getAttribute("data-cost"));
    });
}

function renderShop() {
    const container = document.getElementById("shop-container");
    const current = worlds[worldIndex];

    container.innerHTML = "";

    document.getElementById("world-title").textContent = current.name + " Shop";
    document.body.style.backgroundColor = current.bg;
    document.body.style.color = current.textColor;

    current.upgrades.forEach((upg, index) => {
        const card = document.createElement("div");
        card.className = "upgrade-card";

        card.innerHTML = `
            <p><strong>${upg.name}</strong></p>
            <p>+${upg.power.toLocaleString()} ${upg.type === "click" ? "per click" : "/s"}</p>
            <p>Cost: ${upg.cost.toLocaleString()}</p>
            <button class="shop-btn" data-cost="${upg.cost}" onclick="buyUpgrade(${index})">Buy</button>
        `;

        container.appendChild(card);
    });
}

function makeMoney() {
    money += moneyPerClick;
    updateUI();
}

function buyUpgrade(index) {
    const upg = worlds[worldIndex].upgrades[index];

    if (money >= upg.cost) {
        money -= upg.cost;

        if (upg.type === "click") {
            moneyPerClick += upg.power;
        } else {
            autoIncome += upg.power;
        }

        updateUI();
    }
}

function travel() {
    const current = worlds[worldIndex];

    if (money >= current.nextCost) {
        money = 0;
        worldIndex++;

        if (worldIndex === 1) moneyPerClick = 200;
        if (worldIndex === 2) moneyPerClick = 10000;
        if (worldIndex === 3) moneyPerClick = 500000;

        autoIncome = 0;

        renderShop();
        updateUI();
    }
}

setInterval(() => {
    money += autoIncome;
    updateUI();
}, 1000);

document.getElementById("image-picker").addEventListener("change", function(e) {
    if (e.target.files[0]) {
        document.getElementById("money-button").src =
            URL.createObjectURL(e.target.files[0]);
    }
});

renderShop();
updateUI();
</script>

</body>
</html>
