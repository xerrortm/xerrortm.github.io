<style>

body{
    background:#f8fafc;
}

.shine{
    position:absolute;
    inset:0;
    overflow:hidden;
    pointer-events:none;
}

.shine::before{
    content:"";
    position:absolute;
    top:-40%;
    left:-120%;
    width:60%;
    height:200%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.9),
        transparent
    );
    transform:rotate(25deg);
}

.shine.active::before{
    animation:shineMove 1.2s ease;
}

@keyframes shineMove{

    from{
        left:-120%;
    }

    to{
        left:160%;
    }

}

</style>

</head>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getDatabase,
    ref,
    get,
    update,
    set,
    remove
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {

    apiKey: "AIzaSyA_XrD0M2R-V0IvU_lrxlZ82wIp_K7QoCg",

    authDomain: "error-inc.firebaseapp.com",

    databaseURL: "https://error-inc-default-rtdb.firebaseio.com",

    projectId: "error-inc",

    storageBucket: "error-inc.firebasestorage.app",

    messagingSenderId: "876188868410",

    appId: "1:876188868410:web:ca7de451707bd9975c7a03"

};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

const currentUser =
localStorage.getItem("errorinc_user");

if(!currentUser){

    location.href = "/login";

}

const profileName =
document.getElementById("profileName");

const profileAvatar =
document.getElementById("profileAvatar");

const profileEmail =
document.getElementById("profileEmail");

const badgesContainer =
document.getElementById("badgesContainer");

const badgeCount =
document.getElementById("badgeCount");

profileName.innerText =
currentUser;

profileAvatar.innerText =
currentUser.charAt(0).toUpperCase();

const snapshot =
await get(ref(db, "err-user/" + currentUser));

if(snapshot.exists()){

    const data =
    snapshot.val();

    profileEmail.innerText =
    data.email || "No email found";

    document.getElementById("editUsername").value =
    currentUser;

    document.getElementById("editEmail").value =
    data.email || "";

    const badges =
    data.badges || {};

    const badgeValues =
    Object.values(badges);

    badgeCount.innerText =
    badgeValues.length;

    if(badgeValues.length === 0){

        badgesContainer.innerHTML = `

        <div class="col-span-full text-center py-10 text-slate-400">

            No badges earned yet.

        </div>

        `;

    }

    badgeValues.forEach(badge => {

        badgesContainer.innerHTML += `

        <div
        onclick="openBadge('${badge.name}', '${badge.image}')"
        class="cursor-pointer bg-white border border-slate-200 rounded-3xl p-5 hover:shadow-lg transition">

            <img
            src="${badge.image}"
            class="w-24 h-24 object-contain mx-auto">

            <div class="mt-4 text-center font-bold">
                ${badge.name}
            </div>

        </div>

        `;

    });

}

document.getElementById("saveProfileBtn").onclick =
async () => {

    const newUsername =
    document.getElementById("editUsername").value.trim();

    const newEmail =
    document.getElementById("editEmail").value.trim();

    if(!newUsername || !newEmail){

        alert("Fill in all fields.");
        return;

    }

    const allUsers =
    await get(ref(db, "err-user"));

    let usernameTaken = false;
    let emailTaken = false;

    if(allUsers.exists()){

        allUsers.forEach(child => {

            const key =
            child.key;

            const value =
            child.val();

            if(
                key.toLowerCase() === newUsername.toLowerCase()
                &&
                key !== currentUser
            ){

                usernameTaken = true;

            }

            if(
                value.email &&
                value.email.toLowerCase() === newEmail.toLowerCase()
                &&
                key !== currentUser
            ){

                emailTaken = true;

            }

        });

    }

    if(usernameTaken){

        alert("Username already exists.");
        return;

    }

    if(emailTaken){

        alert("Email already exists.");
        return;

    }

    const currentData =
    snapshot.val();

    const updatedData = {

        ...currentData,

        username:newUsername,
        email:newEmail

    };

    if(newUsername !== currentUser){

        await set(
            ref(db, "err-user/" + newUsername),
            updatedData
        );

        await remove(
            ref(db, "err-user/" + currentUser)
        );

    }else{

        await update(
            ref(db, "err-user/" + currentUser),
            updatedData
        );

    }

    localStorage.setItem(
        "errorinc_user",
        newUsername
    );

    alert("Profile updated successfully.");

    location.reload();

};
</script>

<script>

const logoutBtn =
document.getElementById("logoutBtn");

logoutBtn.onclick = () => {

    localStorage.removeItem("errorinc_user");

    location.href = "/";

};

const editPopup =
document.getElementById("editPopup");

document.getElementById("editBtn").onclick = () => {

    editPopup.classList.remove("hidden");

};

document.getElementById("closeEdit").onclick = () => {

    editPopup.classList.add("hidden");

};

editPopup.onclick = (e) => {

    if(e.target === editPopup){

        editPopup.classList.add("hidden");

    }

};

const badgePopup =
document.getElementById("badgePopup");

const badgePopupImage =
document.getElementById("badgePopupImage");

const badgePopupName =
document.getElementById("badgePopupName");

window.openBadge = function(name, image){

    badgePopupImage.src =
    image;

    badgePopupName.innerText =
    name;

    badgePopup.classList.remove("hidden");

    const shine =
    document.getElementById("badgeShine");

    shine.classList.remove("active");

    void shine.offsetWidth;

    shine.classList.add("active");

};

document.getElementById("closeBadgePopup").onclick = () => {

    badgePopup.classList.add("hidden");

};

badgePopup.onclick = (e) => {

    if(e.target === badgePopup){

        badgePopup.classList.add("hidden");

    }

};

</script>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

emailjs.init("yGVzllcBp2uAdb4pI");

const SERVICE_ID = "service_zjz7o0t";
const TEMPLATE_ID = "template_e9fbdqa";

let verificationCode = null;

document.getElementById("sendCodeBtn").onclick =
async () => {

    const email = localStorage.getItem('errorinc_user')

    if(!email){

        alert("Enter an email first.");
        return;

    }

    verificationCode =
    Math.floor(
        100000 + Math.random() * 900000
    ).toString();

    try{

        await emailjs.send(
            SERVICE_ID,
            TEMPLATE_ID,
            {

                to_email: email,
                code: verificationCode

            }

        );

        document
        .getElementById("verifySection")
        .classList.remove("hidden");

        alert("Verification code sent.");

    }catch(err){

        console.error(err);

        alert("Failed to send email.");

    }

};

document.getElementById("changePasswordBtn").onclick =
async () => {

    const enteredCode =
    document.getElementById("verifyCodeInput").value.trim();

    const newPassword =
    document.getElementById("newPasswordInput").value.trim();

    if(enteredCode !== verificationCode){

        alert("Invalid verification code.");
        return;

    }

    if(newPassword.length < 6){

        alert("Password must be at least 6 characters.");
        return;

    }

    await update(
        ref(db, "err-user/" + currentUser),
        {
            password:newPassword
        }
    );

    alert("Password changed successfully.");

    document.getElementById("verifySection")
    .classList.add("hidden");

};

</script>
