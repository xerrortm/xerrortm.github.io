<html>
<head>
  <title>404 Not Found</title>
  <style>
      .eruda-search-highlight-block{display:inline}
      .eruda-search-highlight-block
      .eruda-keyword{background:#fffbe5;color:#5c5c00}
    .fun-box{
      position:fixed;
      bottom:20px;
      right:20px;
      width:280px;
      border:1px solid #000;
      background:#f5f5f5;
      padding:12px;
      font-family: monospace;
      display:none;
      z-index:5;
    }

    .fun-box button{
      margin-top:8px;
      cursor:pointer;
      border:1px solid #000;
      background:white;
      padding:14px 28px;
      font-size: 22px;
    }

    .pixel{
      position:fixed;
      width:12px;
      height:12px;
      background:black;
      top:-20px;
      animation:fall linear forwards;
      z-index:1;
    }

    @keyframes fall{
      to{
        transform:translateY(110vh) rotate(360deg);
      }
    }

    .secret{
      position:fixed;
      bottom:5px;
      left:5px;
      font-size:10px;
      color:#999;
      cursor:pointer;
      user-select:none;
    }

    .score{
      margin-top:8px;
    }
  </style>
</head>

<body>
  <div>
    <center>
      <h1>404 Not Found</h1>
    </center>
    <hr>
    <center>nginx</center>
  </div>
  <div class="secret" onclick="openFun()">
    . . .
  </div>
  <div class="fun-box" id="funBox">
    <b>404 Not Found</b>
    <br><br>
    nginx
    <div class="score">
      Score: <span id="score">0</span>
    </div>
    <div class="score">
      Time: <span id="time">60</span>
    </div>
    <button id="gameBtn">CLICK ME</button>
  </div>
<script>
const funBox = document.getElementById("funBox");
const gameBtn = document.getElementById("gameBtn");
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");

let score = 0;
let time = 60;
let started = false;
let gameInterval;

const failMessages = [
  "404 Your mouse was not found.",
  "404 More time not found.",
  "500 Skill issue detected.",
  "403 Clicking forbidden.",
  "408 User took too long to respond.",
  "418 I'm a teapot.",
  "410 Your score is gone."
];

const winMessages = [
  "200 OK. You survived.",
  "201 Fun successfully created.",
  "202 Your clicks are being processed."
];

function randomMessage(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function openFun(){
  funBox.style.display = "block";

  if(!started){
    started = true;
    startGame();
  }
}

function popup404(text){

  const popup = document.createElement("div");

  popup.style.position = "fixed";
  popup.style.top = Math.random() * 70 + "%";
  popup.style.left = Math.random() * 70 + "%";
  popup.style.background = "white";
  popup.style.border = "2px solid black";
  popup.style.padding = "10px";
  popup.style.fontFamily = "monospace";
  popup.style.zIndex = "9999";
  popup.style.boxShadow = "4px 4px 0 black";

  popup.innerHTML = `
    <b>ERROR</b>
    <hr>
    ${text}
    <br><br>
    <button onclick="this.parentElement.remove()">OK</button>
  `;

  document.body.appendChild(popup);
}

function rain404(){

  for(let i = 0; i < 20; i++){

    const txt = document.createElement("div");

    txt.innerText = "404";

    txt.style.position = "fixed";
    txt.style.left = Math.random() * window.innerWidth + "px";
    txt.style.top = "-50px";
    txt.style.fontSize = Math.random() * 30 + 10 + "px";
    txt.style.fontFamily = "monospace";
    txt.style.opacity = "0.3";
    txt.style.pointerEvents = "none";

    document.body.appendChild(txt);

    const speed = Math.random() * 5 + 3;

    let y = -50;

    const fall = setInterval(() => {

      y += speed;
      txt.style.top = y + "px";

      if(y > window.innerHeight){
        clearInterval(fall);
        txt.remove();
      }

    }, 16);
  }
}

function weirdEnding(){

  const endings = [

    () => {
      document.body.style.transform = "rotate(1deg)";
      popup404("301 Reality moved permanently.");
    },

    () => {
      document.body.contentEditable = true;
      popup404("204 Website content disappeared.");
    },

    () => {
      for(let i = 0; i < 5; i++){
        popup404("404 Extra popup not found.");
      }
    },

    () => {
      document.title = "404???";
      popup404("502 Brain gateway error.");
    }

  ];

  endings[Math.floor(Math.random() * endings.length)]();
}
let clickLocked = false;

const clickErrors = [

  {
    msg: "403 Clicking forbidden.",
    effect: () => {

      clickLocked = true;

      gameBtn.disabled = true;
      gameBtn.style.opacity = "0.3";

      setTimeout(() => {

        clickLocked = false;

        gameBtn.disabled = false;
        gameBtn.style.opacity = "1";

      }, 2500);

    }
  },

  {
    msg: "410 Your score is gone.",
    effect: () => {

      const oldScore = score;

      scoreEl.textContent = "undefined";

    }
  },
  
  {
    msg: "204 Website content editable.",
    effect: () => {
      document.body.contentEditable = true;
    }
  },

  {
    msg: "408 Time drift detected.",
    effect: () => {

      const glitch = setInterval(() => {

        timeEl.textContent =
          Math.floor(Math.random() * 99);

      }, 100);
      setTimeout(() => {
        clearInterval(glitch);
        timeEl.textContent = time;
      }, 2000);
    }
  },

  {
    msg: "418 I'm a teapot.",
    effect: () => {

      const oldText = gameBtn.textContent;
      gameBtn.disabled = true;

      gameBtn.textContent = "☕ BOILING...";

      setTimeout(() => {

        gameBtn.textContent = oldText;
        gameBtn.disabled = false;

      }, 2000);

    }
  },

  {
    msg: "500 Physics engine crashed.",
    effect: () => {

      document.body.style.transform =
        `rotate(${Math.random() *100 - 50}deg)`;

    }
  },

{
  msg: "401 Unauthorized click detected.",
  effect: () => {

    funBox.style.filter = "blur(4px)";

    setTimeout(() => {
      funBox.style.filter = "none";
    }, 4000);

  }
},

{
  msg: "502 Button gateway failure.",
  effect: () => {

    gameBtn.style.transform =
      `translateX(${Math.random() * 200 - 100}px)`;

  }
},

{
  msg: "406 Acceptable clicks not found.",
  effect: () => {

    score = Math.max(0, score - 5);
    scoreEl.textContent = score;

  }
},

{
  msg: "451 Button unavailable for legal reasons.",
  effect: () => {

    gameBtn.textContent = "[REDACTED]";
    gameBtn.disabled = true;

    setTimeout(() => {

      gameBtn.textContent = "CLICK ME";
      gameBtn.disabled = false;

    }, 3000);

  }
},

{
  msg: "504 Click timeout.",
  effect: () => {

    time -= 5;

    if(time < 0){
      time = 0;
    }

    timeEl.textContent = time;

  }
},

{
  msg: "300 Multiple choices detected.",
  effect: () => {

    for(let i = 0; i < 3; i++){

      const fake = gameBtn.cloneNode(true);

      fake.innerText = "CLICK ME";

      fake.style.position = "fixed";
      fake.style.left = Math.random() * window.innerWidth + "px";
      fake.style.top = Math.random() * window.innerHeight + "px";

      fake.onclick = () => {
        fake.remove();
        popup404("Wrong button.");
      };

      document.body.appendChild(fake);

    }

  }
},

{
  msg: "507 Insufficient pixels.",
  effect: () => {

    document.querySelectorAll(".pixel").forEach(p => {
      p.remove();
    });

  }
},

{
  msg: "302 Button moved temporarily.",
  effect: () => {

    gameBtn.style.position = "relative";

    gameBtn.style.left =
      (Math.random() * 100 - 50) + "px";

    gameBtn.style.top =
      (Math.random() * 100 - 50) + "px";

  }
},

{
  msg: "509 Bandwidth exceeded.",
  effect: () => {

    document.body.style.zoom = "160%";

  }
},

];

gameBtn.onclick = () => {

  if(clickLocked) return;
  score++;

  scoreEl.textContent = score;

  spawnPixels();

  const texts = [
    "CLICK ME",
    "404 BUTTON",
    "MORE CLICKS",
    "DO NOT PRESS",
    "FREE SCORE",
    "CLICK FASTER",
    "ERROR BUTTON"
  ];

  gameBtn.textContent =
    texts[Math.floor(Math.random() * texts.length)];

  const err =
    clickErrors[Math.floor(Math.random() * clickErrors.length)];

  popup404(err.msg);

  err.effect();

};
function startGame(){

  gameInterval = setInterval(() => {

    time--;
    timeEl.textContent = time;

    if(time <= 0){

      clearInterval(gameInterval);

      if(score <= 0){
        rain404();

      } else if(score >= 40){

        popup404("999 SECRET ENDING UNLOCKED.");
        popup404("The 404 has escaped containment.");
        weirdEnding();
        rain404();

      } else if(score >= 25){

        popup404(randomMessage(winMessages));
        rain404();

      } else {
        rain404();
      }

      return;
    }

  }, 1000);
}

function spawnPixels(){

  for(let i = 0; i < 8; i++){

    const pixel = document.createElement("div");

    pixel.className = "pixel";

    pixel.style.left =
      Math.random() * window.innerWidth + "px";

    pixel.style.animationDuration =
      (Math.random() * 2 + 1) + "s";

    document.body.appendChild(pixel);

    setTimeout(() => {
      pixel.remove();
    }, 3000);
  }
}

let typed = "";

document.addEventListener("keydown", (e) => {

  typed += e.key.toLowerCase();

  if(typed.includes("404")){

    openFun();
    popup404("Secret unlocked.");
    typed = "";

  }

  if(typed.includes("nginx")){

    score += 10;
    scoreEl.textContent = score;

    popup404("Admin powers granted.");

    typed = "";

  }

  if(typed.length > 20){

    typed = typed.slice(-20);

  }

});
</script>
</body>
</html>
