<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<title>Sign Up</title>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

<div class="bg-white border rounded-3xl p-8 w-full max-w-md">

    <h1 class="text-3xl font-bold">
        Create Account
    </h1>

    <p class="text-slate-500 mt-2">
        Join ERROR Inc.
    </p>

    <div class="mt-6 space-y-4">

        <input id="username"
        type="text"
        placeholder="Username"
        class="w-full border rounded-xl p-3 outline-none">

        <input id="email"
        type="email"
        placeholder="Email"
        class="w-full border rounded-xl p-3 outline-none">

        <input id="password"
        type="password"
        placeholder="Password"
        class="w-full border rounded-xl p-3 outline-none">

        <button id="signupBtn"
        class="w-full bg-slate-900 text-white py-3 rounded-xl">
            Create Account
        </button>
        <p onclick="location.href='login.html'"class="text-sm text-blue-500">Already have an account?</p>
        <div id="msg" class="text-sm text-red-500"></div>

    </div>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getDatabase,
ref,
get,
set
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyA_XrD0M2R-V0IvU_lrxlZ82wIp_K7QoCg",
    authDomain: "error-inc.firebaseapp.com",
    databaseURL: "https://error-inc-default-rtdb.firebaseio.com",
    projectId: "error-inc",
    storageBucket: "error-inc.firebasestorage.app",
    messagingSenderId: "876188868410",
    appId: "1:876188868410:web:ca7de451707bd9975c7a03"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const btn = document.getElementById("signupBtn");

btn.onclick = async () => {

    const username =
    document.getElementById("username").value.trim();

    const email =
    document.getElementById("email").value.trim();

    const password =
    document.getElementById("password").value;

    const msg =
    document.getElementById("msg");

    msg.innerText = "";

    if (!username || !email || !password) {
        msg.innerText = "Fill all fields";
        return;
    }

    const snapshot =
    await get(ref(db, "err-user"));

    const users = snapshot.val() || {};

    for (const uid in users) {

        const user = users[uid];

        if (user.username === username) {
            msg.innerText = "Username already exists";
            return;
        }

        if (user.email === email) {
            msg.innerText = "Email already exists";
            return;
        }

    }

    await set(
        ref(db, "err-user/" + username),
        {
            username,
            email,
            password,

            badges: {
                welcome: {
                    name: "Welcome",
                    image: "media/badge-welcome.png"
                }
            }
        }
    );

    localStorage.setItem(
        "errorinc_user",
        username
    );

    window.location.href = "index.html";

};

</script>

</body>
</html>
