<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<title>Sign Up</title>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
<div class="bg-white border rounded-3xl p-8 w-full max-w-md">
    <h1 class="text-3xl font-bold">
        Create Account
    </h1>
    <p class="text-slate-500 mt-2">
        Join ERROR Inc.
    </p>
    <div class="mt-6 space-y-4">
        <input id="username"
        type="text"
        placeholder="Username"
        class="w-full border rounded-xl p-3 outline-none">
        
        <input id="email"
        type="email"
        placeholder="Email"
        class="w-full border rounded-xl p-3 outline-none">

        <input id="password"
        type="password"
        placeholder="Password"
        class="w-full border rounded-xl p-3 outline-none">

        <button id="signupBtn" class="w-full bg-slate-900 text-white py-3 rounded-xl flex items-center justify-center gap-3 transition disabled:opacity-70">
            <span id="signupText">
                Sign Up
            </span>
            <div id="signupLoader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
        </button>
        <button id="googleSignupBtn"class="w-full border border-slate-300 py-3 rounded-xl flex items-center justify-center gap-3 hover:bg-slate-50 transition">
            <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C33.7 6.1 29.1 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.2-.4-3.5z"/>
                <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 18.9 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C33.7 6.1 29.1 4 24 4 16.3 4 9.5 8.4 6.3 14.7z"/>
                <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.1C29.2 35.5 26.8 36 24 36c-5.3 0-9.7-3.3-11.3-8l-6.6 5.1C9.4 39.6 16.1 44 24 44z"/>
                <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.1-3.5 5.5-6.3 7.2l6.2 5.1C39.9 37.2 44 31.3 44 24c0-1.3-.1-2.2-.4-3.5z"/>
            </svg>
            <span>Continue with Google</span>
        </button>
        <p onclick="location.href='/login'"class="text-sm text-blue-500 hover:underline cursor-pointer">Already have an account?</p>
        <div id="msg" class="text-sm text-red-500"></div>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getDatabase,
ref,
get,
set
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyA_XrD0M2R-V0IvU_lrxlZ82wIp_K7QoCg",
    authDomain: "error-inc.firebaseapp.com",
    databaseURL: "https://error-inc-default-rtdb.firebaseio.com",
    projectId: "error-inc",
    storageBucket: "error-inc.firebasestorage.app",
    messagingSenderId: "876188868410",
    appId: "1:876188868410:web:ca7de451707bd9975c7a03"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const btn = document.getElementById("signupBtn");

btn.onclick = async () => {

    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");
    const signupLoader = document.getElementById("signupLoader");

    msg.innerText = "";
    btn.disabled = true;
    signupLoader.classList.remove("hidden");

    try {

        let user;
        const googleUid = localStorage.getItem("temp_google_uid");

        if (googleUid) {
            user = {
                uid: googleUid,
                username: username
            };
            localStorage.removeItem("temp_google_uid");
        } else {
            const userCred =
                await createUserWithEmailAndPassword(auth, email, password);
            user = userCred.user;
        }

        await set(ref(db, "err-user/" + user.uid), {
            username,
            email,
            provider: googleUid ? "google" : "email",
            badges: {
                welcome: {
                    name: "Welcome",
                    image: "media/badge-welcome.png"
                }
            }
        });
        localStorage.setItem("errorinc_user", user.uid);
        window.location.href = "/";

    } catch (e) {

        msg.innerText = e.message;
        btn.disabled = false;
        signupLoader.classList.add("hidden");

    }
};
    
document.getElementById("googleSignupBtn").onclick = async () => {
    const provider = new GoogleAuthProvider();
    try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        const username =
            user.displayName ||
            user.email.split("@")[0];

        document.getElementById("email").value = user.email;
        document.getElementById("username").value = username;

        document.getElementById("password").style.display = "none";

        document.getElementById("msg").innerText =
            "Google connected.";

        localStorage.setItem("temp_google_uid", user.uid);

    } catch (e) {
        document.getElementById("msg").innerText = e.message;
    }
};
</script>

</body>
</html>
