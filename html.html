<script>
    const BANANA_SVG = `<svg viewBox="0 0 24 24" width="40" height="40" style="display:inline-block; vertical-align:middle;"><path fill="#FDE047" d="M19.5 2c-1.3 0-2.5.5-3.4 1.4L11.5 8 8 11.5 3.4 16.1c-.9.9-1.4 2.1-1.4 3.4 0 2.5 2 4.5 4.5 4.5 1.3 0 2.5-.5 3.4-1.4l4.6-4.6 3.5-3.5 4.6-4.6c.9-.9 1.4-2.1 1.4-3.4 0-2.5-2-4.5-4.5-4.5zM6.5 22c-1.4 0-2.5-1.1-2.5-2.5 0-.7.3-1.3.7-1.8l4.6-4.6 1.8 1.8-4.6 4.6c-.5.4-1.1.7-1.8.7zm13-15.5l-4.6 4.6-1.8-1.8 4.6-4.6c.5-.4 1.1-.7 1.8-.7 1.4 0 2.5 1.1 2.5 2.5 0 .7-.3 1.3-.7 1.8z"/><path fill="#854D0E" d="M18 2.5c-.3-.3-.7-.5-1-.5s-.7.2-1 .5l-1 1 2 2 1-1c.3-.3.5-.7.5-1s-.2-.7-.5-1z"/></svg>`;
    
    const STICKMAN_HTML = `<div id="cursed-stickman" style="position:fixed; bottom:40px; right:40px; color:currentColor; opacity:0.9; pointer-events:none; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));"><svg width="80" height="140" viewBox="0 0 60 120"><circle cx="30" cy="20" r="15" fill="none" stroke="currentColor" stroke-width="3" /><line x1="30" y1="35" x2="30" y2="80" stroke="currentColor" stroke-width="3" /><line x1="30" y1="50" x2="10" y2="70" stroke="currentColor" stroke-width="3" /><line x1="30" y1="50" x2="50" y2="70" stroke="currentColor" stroke-width="3" /><line x1="30" y1="80" x2="15" y2="110" stroke="currentColor" stroke-width="3" /><line x1="30" y1="80" x2="45" y2="110" stroke="currentColor" stroke-width="3" /></svg><div style="font-size:10px; text-align:center; font-family:monospace; margin-top:5px; font-weight:bold; letter-spacing:1px;">REAL BODY</div></div>`;

    function transpileCursedHTML(rawHTML) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(rawHTML, 'text/html');

        // 1. Identity Crisis: Inject names into text nodes
        let namesToInfect = [];
        const styleTags = doc.querySelectorAll('style');
        styleTags.forEach(style => {
            const regex = /font-family:\s*\[(.*?)\]\s*,\s*([^;]+)/g;
            let match;
            while ((match = regex.exec(style.textContent)) !== null) {
                const rawNames = match[1].split(',').map(n => n.replace(/["']/g, '').trim());
                namesToInfect = [...namesToInfect, ...rawNames];
                style.textContent = style.textContent.replace(match[0], `font-family: ${match[2]}`);
            }
        });

        if (namesToInfect.length > 0) {
            const prefix = namesToInfect.join(' ') + ' ';
            const walker = doc.createTreeWalker(doc.body || doc.documentElement, NodeFilter.SHOW_TEXT, null, false);
            let node;
            const nodesToUpdate = [];
            while(node = walker.nextNode()) { if (node.nodeValue.trim().length > 0) nodesToUpdate.push(node); }
            nodesToUpdate.forEach(n => { if (!n.nodeValue.startsWith(prefix)) n.nodeValue = prefix + n.nodeValue; });
        }

        // 2. Real Comments (<c>)
        doc.querySelectorAll('c').forEach(c => {
            const span = doc.createElement('span');
            span.style.cssText = `display: block; font-family: 'Fira Code', monospace; color: #22c55e; font-style: italic; font-size: 0.9em; margin: 10px 0; opacity: 0.8; padding-left: 10px; border-left: 3px solid #166534;`;
            span.textContent = `/* ${c.textContent} */`;
            c.replaceWith(span);
        });

        // 3. New Feature: Clock Engine (<clock>)
        doc.querySelectorAll('clock').forEach(clock => {
            const type = clock.getAttribute('type') || 'hour, min, sec';
            const span = doc.createElement('span');
            span.className = 'cursed-clock-element';
            span.setAttribute('data-clock-type', type);
            span.textContent = '[LOADING]';
            clock.replaceWith(span);
        });

        // 4. Real Body
        if (doc.body && doc.body.hasAttribute('real')) {
            const container = doc.createElement('div');
            container.innerHTML = STICKMAN_HTML;
            doc.body.appendChild(container.firstElementChild);
        }

        // 5. Inputs (Banana/Food)
        doc.querySelectorAll('input').forEach(input => {
            if (input.getAttribute('type') === 'banana') {
                input.style.cssText = 'background:#fef08a; border:2px solid #eab308; border-radius:8px; padding:8px; color:#854d0e;';
                input.value = input.value || 'Yellow Input';
                input.setAttribute('type', 'text');
            }
            if (input.getAttribute('type') === 'food') {
                const menuWrapper = doc.createElement('div');
                menuWrapper.style.cssText = 'background:linear-gradient(135deg,#1f1f1f,#000); border:2px solid #fbbf24; border-radius:12px; padding:15px; color:white; display:inline-block; min-width:200px; font-family:serif;';
                const title = doc.createElement('div');
                title.textContent = (input.getAttribute('title') || 'MENU').toUpperCase();
                title.style.cssText = 'text-align:center; color:#fbbf24; border-bottom:1px solid #444; margin-bottom:10px; font-size:12px; letter-spacing:2px;';
                menuWrapper.appendChild(title);

                let next = input.nextElementSibling;
                while(next && next.tagName === 'OPTION') {
                    const item = doc.createElement('div');
                    item.style.cssText = 'display:flex; justify-content:space-between; padding:4px 0;';
                    item.innerHTML = `<span>${next.textContent}</span><span style="color:#fbbf24">${next.getAttribute('price') || '$0'}</span>`;
                    menuWrapper.appendChild(item);
                    let toRem = next; next = next.nextElementSibling; toRem.remove();
                }
                input.replaceWith(menuWrapper);
            }
        });

        // 6. Banana Tags
        doc.querySelectorAll('banana').forEach(b => {
            const wrap = doc.createElement('div');
            wrap.style.display = 'inline-block';
            wrap.innerHTML = b.getAttribute('isbanana') === 'true' ? BANANA_SVG : '<span style="color:#eab308;font-weight:bold;">banana</span>';
            b.replaceWith(wrap);
        });
doc.querySelectorAll('rickroll').forEach(r => {
    const audio = doc.createElement('audio');

    audio.src = "https://cs1.mp3.pm/download/152931112/OG5pQkN4ZWJKWm94U3V6NTNIakJjR0dXRGNTV1MrZU80QmlmTFpHSGYrcjJnWjliM1VJQnMxSkxYWEVZY3l3VURoQXcxRmNsakpvMisyZk5hZTlnTFBVemp3TGc3aXdpQktNeFNCV3N6c2F4dktPaDVtNEVqTG1jaGNzcy9jL1E/Rick_ROll_-_Never_gonna_giv_you_up_(mp3.pm).mp3";

    audio.controls = true;
    audio.loop = true;

    const hasFalse = r.hasAttribute("false");

    if (!hasFalse) {
        audio.autoplay = true;
    } else {
        audio.autoplay = false;
    }

    r.replaceWith(audio);
});

        const clockScript = `
            <script>
                function updateClocks() {
                    const now = new Date();
                    document.querySelectorAll('.cursed-clock-element').forEach(el => {
                        const types = el.getAttribute('data-clock-type').split(',').map(t => t.trim());
                        const parts = types.map(t => {
                            switch(t) {
                                case 'sec': return now.getSeconds().toString().padStart(2, '0');
                                case 'min': return now.getMinutes().toString().padStart(2, '0');
                                case 'hour': return now.getHours().toString().padStart(2, '0');
                                case 'day': return now.getDate().toString().padStart(2, '0');
                                case 'month': return (now.getMonth() + 1).toString().padStart(2, '0');
                                case 'year': return now.getFullYear();
                                default: return t;
                            }
                        });
                        el.textContent = parts.join(':').replace(/:([^0-9])/g, ' $1');
                    });
                }
                setInterval(updateClocks, 1000);
                updateClocks();
            <\/script>
        `;

        return doc.documentElement.innerHTML + clockScript;
    }

    window.onload = function() {
        const initialCode = `<!DOCTYPE html>
<html>

</head>

<body real>

  <h1>CursedHTML Feature Demo 🚀🍌⏰</h1>

  <!-- CLOCK ENGINE -->
  <div class="box">

  <!-- IDENTITY CRISIS -->
  <div class="box">

  <!-- BANANA SYSTEM -->
  <div class="box">

    <input type="banana" value="banana input activated">
  </div>

  <!-- FOOD SYSTEM -->
  <div class="box">
    <c>🍽️ Food Compiler System</c>

    <input type="food" title="Cursed Menu">
      <option price="$999">Existential Soup</option>
      <option price="$10">Normal Water</option>
      <option price="$1">Air (discounted)</option>
    </input>
  </div>

  <!-- COMBINED FEATURES -->
  <div class="box">
    <c>🧪 Everything Combined</c>

    <div class="grid">
      <p>Time + Banana:</p>
      <clock type="hour, min"></clock>
      <banana isbanana="true"></banana>

      <p>Food + Clock:</p>
      <input type="food" title="Time Cafe">
        <option price="∞">Frozen Time Cake</option>
        <option price="0">Yesterday's Soup</option>
      </input>

      <p>Full chaos mode:</p>
      <clock type="day, month, year"></clock>
<rickroll false></rickroll>
    </div>
  </div>

  <!-- BODY REAL -->
  <div class="box">
    <c>🕺 Real Body Feature</c>
    <p>Look for the stickman in the bottom-right corner.</p>
  </div>

</body>
</html>`;

        const editor = CodeMirror.fromTextArea(document.getElementById('editor-textarea'), {
            mode: "htmlmixed", theme: "dracula", lineNumbers: true, autoCloseTags: true, tabSize: 2, lineWrapping: true
        });

        editor.setValue(initialCode);
        const updatePreview = () => {
            const transpiled = transpileCursedHTML(editor.getValue());
            const iframe = document.getElementById('preview-frame');
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            iframeDoc.open(); iframeDoc.write(transpiled); iframeDoc.close();
        };

        let timeout;
        editor.on('change', () => { clearTimeout(timeout); timeout = setTimeout(updatePreview, 500); });
        document.getElementById('run-btn').addEventListener('click', updatePreview);
        updatePreview();
    };
</script>

</body>
