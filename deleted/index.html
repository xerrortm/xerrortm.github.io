<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Deleted | ERROR Inc.</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{
    background:#f8fafc;
}
</style>
</head>
<body class="min-h-screen flex items-center justify-center px-6 text-slate-900">
<div class="bg-white border border-slate-200 rounded-[2rem] p-10 max-w-xl w-full text-center shadow-sm">
    <h1 class="text-4xl font-black text-red-600">
        Account deleted
    </h1>
    <p id="statusText"class="text-slate-500 mt-5 text-lg leading-relaxed">

        Checking account...

    </p>

    <p id="recoverText" class="hidden mt-6 text-lg text-slate-500 leading-relaxed">
      If you did it by mistake, you can
      <span id="recoverBtn" class="text-blue-600 hover:underline font-semibold cursor-pointer">
        recover
      </span>
        your account within 7 days.
    </p>

</div>

<div id="recoverPopup"
class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-6">

    <div class="bg-white rounded-[2rem] w-full max-w-md p-8 relative">

    <button id="closeRecoverPopup"
    class="absolute top-4 right-4 text-slate-400 hover:text-black">
        ✕
    </button>

    <h2 class="text-3xl font-black">
        Recover Account
    </h2>

    <p class="text-slate-500 mt-3">
        Confirm your deleted account credentials.
    </p>

    <input
    id="recoverEmail"
    type="email"
    placeholder="Email"
    class="w-full mt-6 border border-slate-200 rounded-2xl px-4 py-3">

    <input
    id="recoverPassword"
    type="password"
    placeholder="Password"
    class="w-full mt-4 border border-slate-200 rounded-2xl px-4 py-3">

    <button id="confirmRecoverBtn"
    class="w-full mt-6 py-4 rounded-2xl bg-blue-600 hover:bg-blue-700 text-white font-bold flex items-center justify-center gap-3 disabled:opacity-70">
        <span id="recoverBtnText">
            Recover Account
        </span>
        <div id="recoverLoader"
        class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin">
        </div>
    </button>
        <button id="googleRecoverBtn" class="mt-4 w-full py-3 rounded-2xl border border-slate-300 flex items-center justify-center gap-3 hover:bg-slate-50 transition">

    <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C33.7 6.1 29.1 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.2-.4-3.5z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 18.9 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C33.7 6.1 29.1 4 24 4 16.3 4 9.5 8.4 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.1C29.2 35.5 26.8 36 24 36c-5.3 0-9.7-3.3-11.3-8l-6.6 5.1C9.4 39.6 16.1 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.1-3.5 5.5-6.3 7.2l6.2 5.1C39.9 37.2 44 31.3 44 24c0-1.3-.1-2.2-.4-3.5z"/>
    </svg>

    Recover with Google
</button>
    <div id="recoverMsg"
    class="mt-4 text-sm text-center text-red-500">
    </div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getDatabase,
    ref,
    get,
    set,
    remove
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithPopup,
    GoogleAuthProvider
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyA_XrD0M2R-V0IvU_lrxlZ82wIp_K7QoCg",
    authDomain: "error-inc.firebaseapp.com",
    databaseURL: "https://error-inc-default-rtdb.firebaseio.com",
    projectId: "error-inc",
    storageBucket: "error-inc.firebasestorage.app",
    messagingSenderId: "876188868410",
    appId: "1:876188868410:web:ca7de451707bd9975c7a03"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const params = new URLSearchParams(location.search);
const uid = params.get("user");

const statusText = document.getElementById("statusText");
const recoverSection = document.getElementById("recoverText");

if (!uid) {
    statusText.innerHTML = "Invalid recovery link.";
    throw new Error("Missing UID");
}

const deletedSnap = await get(ref(db, "deleted-users/" + uid));

if (deletedSnap.exists()) {

    statusText.innerHTML = `
        This account (${uid}) was deleted.<br>
    `;
    recoverSection.classList.remove("hidden");

} else {

    statusText.innerHTML = "No deleted account found for this user.";
}

const recoverPopup = document.getElementById("recoverPopup");

document.getElementById("recoverBtn").onclick = () => {
    recoverPopup.classList.remove("hidden");
};

document.getElementById("closeRecoverPopup").onclick = () => {
    recoverPopup.classList.add("hidden");
};

recoverPopup.onclick = (e) => {
    if (e.target === recoverPopup) {
        recoverPopup.classList.add("hidden");
    }
};

document.getElementById("confirmRecoverBtn").onclick = async () => {

    const email = document.getElementById("recoverEmail").value.trim();
    const password = document.getElementById("recoverPassword").value.trim();

    const btn = document.getElementById("confirmRecoverBtn");
    const loader = document.getElementById("recoverLoader");
    const msg = document.getElementById("recoverMsg");

    msg.innerText = "";
    btn.disabled = true;
    loader.classList.remove("hidden");

    if (!email || !password) {
        msg.innerText = "Fill in all fields";
        btn.disabled = false;
        loader.classList.add("hidden");
        return;
    }

    try {

        const deletedRef = ref(db, "deleted-users/" + uid);
        const snap = await get(deletedRef);

        if (!snap.exists()) {
            msg.innerText = "Deleted account not found";
            return;
        }

        const deletedData = snap.val();

        if (deletedData.accountData.email !== email) {
            msg.innerText = "Email does not match deleted account";
            return;
        }

        const cred = await createUserWithEmailAndPassword(auth, email, password);
        const newUid = cred.user.uid;

        await set(ref(db, "err-user/" + newUid), {
            ...deletedData.accountData,
            email,
            uid: newUid
        });

        await remove(deletedRef);

        msg.className = "mt-4 text-sm text-center text-green-600";
        msg.innerText = "Account recovered successfully 🚀";

        setTimeout(() => {
            location.href = "/profile";
        }, 1000);

    } catch (err) {

        console.error(err);
        msg.innerText = err.message || "Recovery failed";

    } finally {

        btn.disabled = false;
        loader.classList.add("hidden");
    }
};
document.getElementById("googleRecoverBtn").onclick = () => {
    window.recoverWithGoogle();
};
window.recoverWithGoogle = async () => {

    const provider = new GoogleAuthProvider();

    try {

        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        const deletedSnap = await get(
            ref(db, "deleted-users/" + uid)
        );

        if (!deletedSnap.exists()) {
            alert("No deleted account found.");
            return;
        }

        const deletedData = deletedSnap.val();
        await set(ref(db, "err-user/" + user.uid), {
            ...deletedData.accountData,
            email: user.email,
            username: deletedData.accountData.username,
            uid: user.uid
        });

        await remove(ref(db, "deleted-users/" + uid));

        location.href = "/profile";

    } catch (e) {
        console.error(e);
        alert("Google recovery failed");
    }
};
</script>

</body>
</html>
