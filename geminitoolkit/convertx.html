<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConvertX - All-in-One Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #f8fafc, #e2e8f0);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .category-btn.active {
            background-color: #3b82f6;
            color: white;
            transform: scale(1.05);
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
            ring: 2px;
            ring-color: #93c5fd;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="w-full max-w-2xl">
        <div class="glass-card rounded-3xl p-8 md:p-10">
            <!-- Header -->
            <div class="mb-10 text-center">
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">ConvertX</h1>
                <p class="text-slate-500 mt-2 font-medium">Precision conversions at your fingertips</p>
            </div>

            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-10" id="categoryContainer">
                <button onclick="setCategory('length')" class="category-btn active p-3 rounded-2xl border border-slate-200 flex flex-col items-center transition-all duration-200 hover:border-blue-400 group" data-cat="length">
                    <svg class="w-6 h-6 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                    <span class="text-sm font-semibold">Length</span>
                </button>
                <button onclick="setCategory('weight')" class="category-btn p-3 rounded-2xl border border-slate-200 flex flex-col items-center transition-all duration-200 hover:border-blue-400" data-cat="weight">
                    <svg class="w-6 h-6 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path></svg>
                    <span class="text-sm font-semibold">Weight</span>
                </button>
                <button onclick="setCategory('temperature')" class="category-btn p-3 rounded-2xl border border-slate-200 flex flex-col items-center transition-all duration-200 hover:border-blue-400" data-cat="temperature">
                    <svg class="w-6 h-6 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    <span class="text-sm font-semibold">Temp</span>
                </button>
                <button onclick="setCategory('data')" class="category-btn p-3 rounded-2xl border border-slate-200 flex flex-col items-center transition-all duration-200 hover:border-blue-400" data-cat="data">
                    <svg class="w-6 h-6 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
                    <span class="text-sm font-semibold">Data</span>
                </button>
            </div>

            <div class="space-y-6">
                <!-- Input Group -->
                <div class="relative">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Value to Convert</label>
                    <input type="number" id="inputValue" value="1" step="any" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-xl font-medium text-slate-800 transition-all" placeholder="Enter number...">
                </div>

                <!-- Selectors -->
                <div class="flex flex-col md:flex-row items-center gap-4">
                    <div class="w-full">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1 mb-2 block">From</label>
                        <select id="fromUnit" class="w-full p-4 bg-white border border-slate-200 rounded-2xl appearance-none cursor-pointer font-medium text-slate-700"></select>
                    </div>
                    
                    <button onclick="swapUnits()" class="mt-6 p-3 rounded-full bg-slate-100 hover:bg-blue-100 text-slate-500 hover:text-blue-600 transition-all transform hover:rotate-180">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path></svg>
                    </button>

                    <div class="w-full">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1 mb-2 block">To</label>
                        <select id="toUnit" class="w-full p-4 bg-white border border-slate-200 rounded-2xl appearance-none cursor-pointer font-medium text-slate-700"></select>
                    </div>
                </div>

                <div class="mt-10 p-6 bg-blue-50 rounded-3xl border border-blue-100 relative overflow-hidden">
                    <div class="relative z-10">
                        <span class="text-blue-600 text-xs font-bold uppercase tracking-widest block mb-1">Result</span>
                        <div class="flex items-end justify-between gap-4">
                            <h2 id="resultDisplay" class="text-4xl font-bold text-blue-900 break-all leading-tight">0</h2>
                            <button id="copyBtn" class="mb-1 p-2 bg-white text-blue-600 rounded-xl shadow-sm hover:shadow-md active:scale-95 transition-all" title="Copy to clipboard">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                            </button>
                        </div>
                    </div>
                    <!-- Decorative Circle -->
                    <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-blue-100 rounded-full opacity-50"></div>
                </div>
            </div>

            <!-- Toast Message (Hidden by default) -->
            <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full text-sm font-medium opacity-0 transition-opacity duration-300 pointer-events-none">
                Result copied to clipboard!
            </div>
        </div>
        <p class="text-center mt-6 text-slate-400 text-xs font-medium uppercase tracking-widest">Built with precision for the modern web</p>
    </div>

    <script>
        const units = {
            length: {
                meter: 1,
                kilometer: 0.001,
                centimeter: 100,
                millimeter: 1000,
                mile: 0.000621371,
                yard: 1.09361,
                foot: 3.28084,
                inch: 39.3701
            },
            weight: {
                kilogram: 1,
                gram: 1000,
                milligram: 1000000,
                pound: 2.20462,
                ounce: 35.274,
                ton: 0.001
            },
            data: {
                byte: 1,
                kilobyte: 1 / 1024,
                megabyte: 1 / (1024 ** 2),
                gigabyte: 1 / (1024 ** 3),
                terabyte: 1 / (1024 ** 4),
                bit: 8
            },
            temperature: {
                celsius: 'C',
                fahrenheit: 'F',
                kelvin: 'K'
            }
        };

        let currentCategory = 'length';
        const inputEl = document.getElementById('inputValue');
        const fromEl = document.getElementById('fromUnit');
        const toEl = document.getElementById('toUnit');
        const resultDisplay = document.getElementById('resultDisplay');
        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');

        function setCategory(cat) {
            currentCategory = cat;
            
            // UI Update for buttons
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.dataset.cat === cat) btn.classList.add('active');
            });

            // Update Selects
            fromEl.innerHTML = '';
            toEl.innerHTML = '';
            
            const unitOptions = Object.keys(units[cat]);
            unitOptions.forEach((unit, index) => {
                const optFrom = document.createElement('option');
                optFrom.value = unit;
                optFrom.textContent = unit.charAt(0).toUpperCase() + unit.slice(1);
                fromEl.appendChild(optFrom);

                const optTo = document.createElement('option');
                optTo.value = unit;
                optTo.textContent = unit.charAt(0).toUpperCase() + unit.slice(1);
                toEl.appendChild(optTo);
            });

            // Set different default for "To" if possible
            if (toEl.options.length > 1) toEl.selectedIndex = 1;
            
            convert();
        }

        function convert() {
            const value = parseFloat(inputEl.value);
            if (isNaN(value)) {
                resultDisplay.textContent = "0";
                return;
            }

            const from = fromEl.value;
            const to = toEl.value;

            let result = 0;

            if (currentCategory === 'temperature') {
                // Special Temp Logic
                let tempInC;
                if (from === 'celsius') tempInC = value;
                else if (from === 'fahrenheit') tempInC = (value - 32) * 5/9;
                else if (from === 'kelvin') tempInC = value - 273.15;

                if (to === 'celsius') result = tempInC;
                else if (to === 'fahrenheit') result = (tempInC * 9/5) + 32;
                else if (to === 'kelvin') result = tempInC + 273.15;
            } else {
                // Standard multiplier logic
                const valInBase = value / units[currentCategory][from];
                result = valInBase * units[currentCategory][to];
            }

            // Formatting: limit to 6 decimals but avoid trailing zeros
            const formattedResult = Number(result.toFixed(6));
            resultDisplay.textContent = formattedResult.toLocaleString();
        }

        function swapUnits() {
            const temp = fromEl.value;
            fromEl.value = toEl.value;
            toEl.value = temp;
            convert();
        }

        function copyToClipboard() {
            const textToCopy = resultDisplay.textContent.replace(/,/g, '');
            const el = document.createElement('textarea');
            el.value = textToCopy;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            // Show Toast
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2000);
        }

        inputEl.addEventListener('input', convert);
        fromEl.addEventListener('change', convert);
        toEl.addEventListener('change', convert);
        copyBtn.addEventListener('click', copyToClipboard);

        // Initial setup
        window.onload = () => {
            setCategory('length');
        };
    </script>
</body>
</html>
