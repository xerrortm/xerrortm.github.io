<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextForge - Professional Text Utility</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .tool-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tool-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.05);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-slate-900 rounded-2xl text-white shadow-xl shadow-slate-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">TextForge</h1>
                    <p class="text-slate-500 font-medium">Precision text manipulation & analysis engine.</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="clearAll()" class="px-5 py-2.5 text-slate-600 font-semibold hover:bg-slate-200 rounded-xl transition-all">Clear</button>
                <button onclick="copyToClipboard()" class="px-5 py-2.5 bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 active:scale-95 transition-all">Copy Result</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left: Workspace -->
            <div class="lg:col-span-8 space-y-6">
                <div class="bg-white rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden flex flex-col h-[600px]">
                    <div class="flex items-center justify-between px-8 py-4 border-b border-slate-50 bg-slate-50/50">
                        <div class="flex gap-4">
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Input Buffer</span>
                        </div>
                        <div id="statusBadge" class="flex items-center gap-2 px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-[10px] font-bold">
                            <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></div>
                            READY
                        </div>
                    </div>
                    <textarea id="textInput" 
                        class="flex-1 p-8 text-lg font-medium text-slate-700 bg-transparent outline-none resize-none custom-scrollbar leading-relaxed" 
                        placeholder="Paste your text here to begin transformation..."
                        oninput="analyzeText()"></textarea>
                </div>

                <!-- Stats Dashboard -->
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                        <p class="text-xs font-bold text-slate-400 uppercase mb-1">Characters</p>
                        <p id="charCount" class="text-2xl font-bold text-slate-800">0</p>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                        <p class="text-xs font-bold text-slate-400 uppercase mb-1">Words</p>
                        <p id="wordCount" class="text-2xl font-bold text-slate-800">0</p>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                        <p class="text-xs font-bold text-slate-400 uppercase mb-1">Lines</p>
                        <p id="lineCount" class="text-2xl font-bold text-slate-800">0</p>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                        <p class="text-xs font-bold text-slate-400 uppercase mb-1">Reading Time</p>
                        <p id="readTime" class="text-2xl font-bold text-slate-800">0m</p>
                    </div>
                </div>
            </div>

            <!-- Right: Toolbar -->
            <div class="lg:col-span-4 space-y-6">
                <!-- Transform Section -->
                <div class="glass p-6 rounded-[2rem] border border-white shadow-xl">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Transformations</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="transform('uppercase')" class="tool-card p-3 bg-white rounded-xl text-xs font-bold border border-slate-100 text-slate-600 hover:border-indigo-500 hover:text-indigo-600">UPPERCASE</button>
                        <button onclick="transform('lowercase')" class="tool-card p-3 bg-white rounded-xl text-xs font-bold border border-slate-100 text-slate-600 hover:border-indigo-500 hover:text-indigo-600">lowercase</button>
                        <button onclick="transform('title')" class="tool-card p-3 bg-white rounded-xl text-xs font-bold border border-slate-100 text-slate-600 hover:border-indigo-500 hover:text-indigo-600">Title Case</button>
                        <button onclick="transform('sentence')" class="tool-card p-3 bg-white rounded-xl text-xs font-bold border border-slate-100 text-slate-600 hover:border-indigo-500 hover:text-indigo-600">Sentence case</button>
                    </div>
                </div>

                <!-- Cleaning Section -->
                <div class="glass p-6 rounded-[2rem] border border-white shadow-xl">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Data Cleaning</h3>
                    <div class="space-y-2">
                        <button onclick="clean('whitespace')" class="w-full text-left p-3 bg-white rounded-xl text-xs font-bold border border-slate-100 text-slate-600 hover:bg-slate-50 transition-all flex items-center justify-between">
                            Trim Whitespace
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"></path></svg>
                        </button>
                        <button onclick="clean('empty')" class="w-full text-left p-3 bg-white rounded-xl text-xs font-bold border border-slate-100 text-slate-600 hover:bg-slate-50 transition-all flex items-center justify-between">
                            Remove Empty Lines
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                        <button onclick="clean('duplicates')" class="w-full text-left p-3 bg-white rounded-xl text-xs font-bold border border-slate-100 text-slate-600 hover:bg-slate-50 transition-all flex items-center justify-between">
                            Remove Duplicates
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>
                        </button>
                    </div>
                </div>

                <!-- Find & Replace -->
                <div class="glass p-6 rounded-[2rem] border border-white shadow-xl">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Search & Replace</h3>
                    <div class="space-y-3">
                        <input type="text" id="findInput" placeholder="Find..." class="w-full px-4 py-2 bg-white border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500/20">
                        <input type="text" id="replaceInput" placeholder="Replace with..." class="w-full px-4 py-2 bg-white border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500/20">
                        <button onclick="executeReplace()" class="w-full py-3 bg-slate-900 text-white rounded-xl text-xs font-bold hover:bg-slate-800 transition-all">Replace All</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl transition-all duration-300 translate-y-24 opacity-0 pointer-events-none z-50">
        <span id="toastMsg" class="font-bold text-sm">Action completed!</span>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const stats = {
            char: document.getElementById('charCount'),
            word: document.getElementById('wordCount'),
            line: document.getElementById('lineCount'),
            read: document.getElementById('readTime')
        };

        function analyzeText() {
            const val = textInput.value;
            stats.char.textContent = val.length.toLocaleString();
            
            const words = val.trim() ? val.trim().split(/\s+/).length : 0;
            stats.word.textContent = words.toLocaleString();
            
            const lines = val.trim() ? val.split(/\n/).length : 0;
            stats.line.textContent = lines.toLocaleString();
            
            const minutes = Math.ceil(words / 200);
            stats.read.textContent = minutes + 'm';
        }

        function transform(type) {
            let val = textInput.value;
            if (!val) return;

            switch(type) {
                case 'uppercase': val = val.toUpperCase(); break;
                case 'lowercase': val = val.toLowerCase(); break;
                case 'title': 
                    val = val.toLowerCase().split(' ').map(word => 
                        word.charAt(0).toUpperCase() + word.slice(1)
                    ).join(' ');
                    break;
                case 'sentence':
                    val = val.toLowerCase().replace(/(^\s*\w|[.!?]\s*\w)/g, c => c.toUpperCase());
                    break;
            }
            textInput.value = val;
            analyzeText();
            showToast("Text transformed");
        }

        function clean(type) {
            let val = textInput.value;
            if (!val) return;

            switch(type) {
                case 'whitespace':
                    val = val.split('\n').map(line => line.trim().replace(/\s+/g, ' ')).join('\n');
                    break;
                case 'empty':
                    val = val.split('\n').filter(line => line.trim() !== '').join('\n');
                    break;
                case 'duplicates':
                    val = [...new Set(val.split('\n'))].join('\n');
                    break;
            }
            textInput.value = val;
            analyzeText();
            showToast("Data cleaned");
        }

        function executeReplace() {
            const findText = document.getElementById('findInput').value;
            const replaceText = document.getElementById('replaceInput').value;
            if (!findText) return;

            const val = textInput.value;
            // Use regex for global replace, escaping special chars
            const escapedFind = findText.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(escapedFind, 'g');
            textInput.value = val.replace(regex, replaceText);
            
            analyzeText();
            showToast(`Replaced all occurrences of "${findText}"`);
        }

        function clearAll() {
            textInput.value = '';
            analyzeText();
            showToast("Workspace cleared");
        }

        function copyToClipboard() {
            const val = textInput.value;
            if (!val) return;
            
            const el = document.createElement('textarea');
            el.value = val;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("Copied to clipboard!");
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            toastMsg.textContent = msg;
            toast.classList.remove('translate-y-24', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.add('translate-y-24', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 2500);
        }

        // Initialize
        window.onload = analyzeText;
    </script>
</body>
</html>
