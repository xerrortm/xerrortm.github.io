<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<title>Log In</title>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

<div class="bg-white border rounded-3xl p-8 w-full max-w-md">

    <h1 class="text-3xl font-bold">
        Log In
    </h1>

    <p class="text-slate-500 mt-2">
        Welcome back.
    </p>

    <div class="mt-6 space-y-4">

        <input id="username"
        type="text"
        placeholder="Username"
        class="w-full border rounded-xl p-3 outline-none">

        <input id="password"
        type="password"
        placeholder="Password"
        class="w-full border rounded-xl p-3 outline-none">

        <button id="loginBtn" class="w-full bg-slate-900 text-white py-3 rounded-xl flex items-center justify-center gap-3 transition disabled:opacity-70">
            <span id="loginText">
                Log In
            </span>
            <div id="loginLoader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
        </button>
        <button id="googleLoginBtn"class="w-full border border-slate-300 py-3 rounded-xl flex items-center justify-center gap-3 hover:bg-slate-50 transition">
            <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C33.7 6.1 29.1 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.2-.4-3.5z"/>
                <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 18.9 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C33.7 6.1 29.1 4 24 4 16.3 4 9.5 8.4 6.3 14.7z"/>
                <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.1C29.2 35.5 26.8 36 24 36c-5.3 0-9.7-3.3-11.3-8l-6.6 5.1C9.4 39.6 16.1 44 24 44z"/>
                <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.1-3.5 5.5-6.3 7.2l6.2 5.1C39.9 37.2 44 31.3 44 24c0-1.3-.1-2.2-.4-3.5z"/>
            </svg>
            <span>Continue with Google</span>
        </button>
        <p onclick="location.href='/signup'"class="text-sm text-blue-500 hover:underline cursor-pointer">Don't have an account?</p>
        <div id="msg" class="text-sm text-red-500"></div>

    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getDatabase,
ref,
get
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
const firebaseConfig = {
    apiKey: "AIzaSyA_XrD0M2R-V0IvU_lrxlZ82wIp_K7QoCg",
    authDomain: "error-inc.firebaseapp.com",
    databaseURL: "https://error-inc-default-rtdb.firebaseio.com",
    projectId: "error-inc",
    storageBucket: "error-inc.firebasestorage.app",
    messagingSenderId: "876188868410",
    appId: "1:876188868410:web:ca7de451707bd9975c7a03"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
    
document.getElementById("loginBtn").onclick = async () => {

    const email = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");
    const loginBtn = document.getElementById("loginBtn");
    const loginLoader = document.getElementById("loginLoader");

    msg.innerText = "";
    loginBtn.disabled = true;
    loginLoader.classList.remove("hidden");

    try {

        const userCred = await signInWithEmailAndPassword(auth, email, password);

        const user = userCred.user;

        localStorage.setItem("errorinc_user", user.uid);

        window.location.href = "/";

    } catch (e) {
        msg.innerText = "Invalid email or password";
        loginBtn.disabled = false;
        loginLoader.classList.add("hidden");
    }
};
document.getElementById("googleLoginBtn").onclick = async () => {
    const provider = new GoogleAuthProvider();
    try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        const snap = await get(ref(db, "err-user/" + user.uid));

        if (!snap.exists()) {
            document.getElementById("msg").innerText = "Account not found. Please sign up first.";
            document.getElementById("loginBtn").enabled=false;
            return;
        }

        localStorage.setItem("errorinc_user", user.uid);
        window.location.href = "/";

    } catch (e) {
        document.getElementById("msg").innerText =
            "Google login failed";
        console.log(e);
    }
};
</script>

</body>
</html>
