<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Profile | ERROR Inc.</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    background:#f8fafc;
}

.shine{
    position:absolute;
    inset:0;
    overflow:hidden;
    pointer-events:none;
}

.shine::before{
    content:"";
    position:absolute;
    top:-40%;
    left:-120%;
    width:60%;
    height:200%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.9),
        transparent
    );
    transform:rotate(25deg);
}

.shine.active::before{
    animation:shineMove 1.2s ease;
}

@keyframes shineMove{
    from{left:-120%;}
    to{left:160%;}
}

</style>
</head>

<body class="text-slate-900">

<nav class="sticky top-0 z-50 bg-white/80 backdrop-blur border-b border-slate-200 px-10 py-4 flex justify-between items-center">

    <img onclick="location.href='/'"
    src="https://images.squarespace-cdn.com/content/v1/6800b55ad24bf56cbb160dea/5c585ad8-9e96-472a-bc88-5d2ea8f05993/ERRORL1-removebg-preview.png"
    class="h-14 cursor-pointer">

    <div class="flex items-center gap-5 text-sm">
        <a href="/projects" class="text-slate-600 hover:text-black">Projects</a>
        <a href="/community" class="text-slate-600 hover:text-black">Community</a>
    </div>

</nav>

<div id="private" class="hidden text-center mt-20 text-slate-500 text-xl">
    This profile is private 🔒
</div>

<!-- PROFILE -->
<section id="profile" class="hidden max-w-6xl mx-auto px-6 py-14">

    <div class="bg-white border border-slate-200 rounded-[2rem] p-10 shadow-sm">

        <div class="flex flex-col lg:flex-row gap-10 justify-between">

            <div class="flex gap-6">

                <div id="profileAvatar"
                class="w-32 h-32 rounded-[2rem] bg-gradient-to-br from-indigo-500 to-indigo-700 text-white flex items-center justify-center text-5xl font-black shadow-lg">
                    U
                </div>

                <div>

                    <div class="flex items-center gap-3">

                        <h1 id="profileName"
                        class="text-5xl font-black">username</h1>

                    </div>

                    <p class="text-slate-500 mt-4 text-lg">
                        ERROR Inc. Community Member
                    </p>

                    <div id="topBadges" class="mt-6 flex flex-wrap gap-3"></div>

                </div>

            </div>

            <div class="grid gap-4 w-full lg:w-[320px]">

                <div class="bg-slate-50 border border-slate-200 rounded-3xl p-6">

                    <div class="text-sm text-slate-400">
                        Badges Earned
                    </div>

                    <div id="badgeCount"
                    class="text-4xl font-black mt-2">
                        0
                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- BADGES -->
<section id="badgesSection" class="hidden max-w-6xl mx-auto px-6 pb-20">

    <div class="bg-white border border-slate-200 rounded-[2rem] p-8">

        <div class="flex items-center justify-between">

            <h2 class="text-3xl font-black">Badges</h2>

        </div>

        <div id="badgesContainer"
        class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 mt-8">
        </div>

    </div>

</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyA_XrD0M2R-V0IvU_lrxlZ82wIp_K7QoCg",
    authDomain: "error-inc.firebaseapp.com",
    databaseURL: "https://error-inc-default-rtdb.firebaseio.com",
    projectId: "error-inc"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const name = new URLSearchParams(location.search).get("name");

const profile = document.getElementById("profile");
const badgesSection = document.getElementById("badgesSection");
const privateMsg = document.getElementById("private");

if(!name){
    privateMsg.classList.remove("hidden");
} else {

    const snap = await get(ref(db, "err-user/" + name));

    if(!snap.exists() || !snap.val().public){
        privateMsg.classList.remove("hidden");
    } else {

        const data = snap.val();

        profile.classList.remove("hidden");
        badgesSection.classList.remove("hidden");

        document.getElementById("profileName").innerText = name;
        document.getElementById("profileAvatar").innerText = name.charAt(0).toUpperCase();
        document.title = `${name} | ERROR Inc.`;

        const badges = Object.values(data.badges || {});
        const container = document.getElementById("badgesContainer");
        const badgeCount = document.getElementById("badgeCount");
        const topBadges = document.getElementById("topBadges");

        badgeCount.innerText = badges.length;

        if(badges.length >= 2){

            topBadges.innerHTML = `
                <div class="px-4 py-2 bg-indigo-100 rounded-xl">${badges[0].name}</div>
                <div class="px-4 py-2 bg-purple-100 rounded-xl">${badges[1].name}</div>
            `;

        } else if(badges.length === 1){

            topBadges.innerHTML = `
                <div class="px-4 py-2 bg-slate-100 rounded-xl">${badges[0].name}</div>
            `;

        } else {

            topBadges.innerHTML = `
                <div class="px-4 py-2 bg-slate-100 rounded-xl">Member</div>
            `;

        }

        badges.forEach(b => {
            container.innerHTML += `
                <div class="bg-white border rounded-3xl p-5 text-center">
                    <img src="../${b.image}" class="w-20 h-20 mx-auto"/>
                    <div class="font-bold mt-2">${b.name}</div>
                </div>
            `;
        });

    }

}

</script>

</body>
</html>
